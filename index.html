<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Projeto Autenticação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">
    <main class="container">
        <section class="glass-card">
            <div class="header">
                <i class="fas fa-user-plus"></i>
                <h1>Criar Conta</h1>
                <p>Inicie sua jornada no sistema</p>
            </div>

            <form id="register-form" class="form">
                <div class="field">
                    <label for="reg-name">Nome Completo</label>
                    <input type="text" id="reg-name" placeholder="Ex: Tony Stark">
                </div>

                <div class="field">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="nome@exemplo.com">
                </div>

                <div class="field password-wrapper">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-password', 'eye-reg-password')" aria-label="Mostrar ou ocultar senha">
                        <i class="fas fa-eye" id="eye-reg-password"></i>
                    </button>
                </div>

                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
            </form>

            <div id="reg-message" class="message"></div>

            <p class="footer-text">
                Já possui acesso?
                <a href="login.html">Entrar no sistema</a>
            </p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
