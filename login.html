<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Autenticação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
    <main class="container">
        <section class="glass-card">
            <div class="header">
                <i class="fas fa-shield-alt"></i>
                <h1>Autenticação</h1>
                <p>Acesse o seu terminal seguro</p>
            </div>

            <form id="login-form" class="form">
                <div class="field">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com">
                </div>

                <div class="field password-wrapper">
                    <div class="row-between">
                        <span class="field-label">Senha</span>
                        <a href="#" class="forgot-link" onclick="forgotPassword(); return false;">Esqueceu?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePassword('login-password', 'eye-login-password')" aria-label="Mostrar ou ocultar senha">
                        <i class="fas fa-eye" id="eye-login-password"></i>
                    </button>
                </div>

                <button type="submit" class="btn-primary">Acessar Sistema</button>
            </form>

            <div id="login-message" class="message"></div>

            <p class="footer-text">
                Novo por aqui?
                <a href="index.html">Criar conta</a>
            </p>
        </section>
    </main>

    <div id="modal-overlay" class="modal-overlay">
        <div class="glass-card modal-card">
            <i class="fas fa-key"></i>
            <h3>Recuperação</h3>
            <p id="modal-text"></p>
            <button type="button" class="btn-primary" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
